aname: make stuff
on:
  push:
    branches:
      - main
jobs:
  build:
    name: build stuff
    runs-on: ubuntu-latest
    steps:
      - name: check
        uses: actions/checkout@v4
      - name: install ansible
        run: |
          sudo apt update && sudo apt install ansible
          sudo apt install ansible-lint
      - name: run
        run: |
          ansible-lint playbooks/stp/stp.yml
